# Blueprint de Render — despliega la API + base de datos PostgreSQL con un clic.
# En Render: New + > Blueprint > conecta este repositorio.
services:
  - type: web
    name: citafacil-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: citafacil-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true          # Render genera un token seguro (míralo en el panel)
      - key: BUSINESS_NAME
        value: "Barbería Don Lucho"
      - key: BUSINESS_TIMEZONE
        value: "America/Santiago"
      - key: CORS_ORIGINS
        value: "*"
      # Twilio: se configuran a mano en el panel (secretos). Vacíos = modo demo.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

databases:
  - name: citafacil-db
    plan: free
